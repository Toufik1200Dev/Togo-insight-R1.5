# Build the Next.js app in the GitHub runner and deploy the built output to the
# Azure Web App. The server does NOT rebuild — set SCM_DO_BUILD_DURING_DEPLOYMENT=false
# in the Web App app settings so it just runs the startup command `npm run start`.

name: Build and deploy Node.js app to Azure Web App - Togo-insightR1

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC azure/login
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E3E7D21EB39B4E5FB9599CBE915AE787 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_625ABDF03E414A12BC916CD24BA50B05 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4278EDB70BDD4FA49B2D2B667D4E1C00 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "Togo-insightR1"
          slot-name: "Production"
          package: .
