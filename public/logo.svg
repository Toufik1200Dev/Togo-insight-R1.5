<?xml version="1.0" encoding="UTF-8"?>
<!-- Togo Insight emblem: 5G lattice tower over a sunset, in a circle.
     Recreated as vector so it stays crisp at any size. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Togo Insight">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6a1a"/>
      <stop offset="0.42" stop-color="#ff9b32"/>
      <stop offset="0.72" stop-color="#ffc862"/>
      <stop offset="1" stop-color="#ffe2a0"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff6e0"/>
      <stop offset="1" stop-color="#ffeec2"/>
    </radialGradient>
    <clipPath id="clip"><circle cx="64" cy="64" r="60"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- sky + sun -->
    <rect x="4" y="4" width="120" height="120" fill="url(#sky)"/>
    <circle cx="64" cy="70" r="30" fill="url(#sun)"/>

    <!-- birds -->
    <path d="M30 40 q4 -4 8 0 q4 -4 8 0" fill="none" stroke="#9a4a1e" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
    <path d="M88 34 q3 -3 6 0 q3 -3 6 0" fill="none" stroke="#9a4a1e" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>

    <!-- hills -->
    <path d="M4 94 Q30 82 54 91 T100 86 Q114 83 124 92 L124 124 L4 124 Z" fill="#1f8f82"/>
    <path d="M4 106 Q36 95 64 103 Q92 112 124 101 L124 124 L4 124 Z" fill="#0c4a45"/>

    <!-- palm tree (right hill) -->
    <g stroke="#0b2330" stroke-width="2" stroke-linecap="round" fill="none">
      <path d="M103 110 q2 -10 1 -18"/>
      <path d="M104 92 q-7 -3 -12 1 M104 92 q7 -3 12 1 M104 92 q-5 -7 -10 -7 M104 92 q5 -7 10 -7 M104 92 q0 -8 0 -10"/>
    </g>

    <!-- 5G lattice tower -->
    <g stroke="#0b2330" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- legs -->
      <path d="M55 104 L62 33"/>
      <path d="M73 104 L66 33"/>
      <!-- rungs -->
      <path d="M55 104 L73 104"/>
      <path d="M56.6 88 L71.4 88"/>
      <path d="M58.2 72 L69.8 72"/>
      <path d="M59.7 56 L68.3 56"/>
      <path d="M61.3 40 L66.7 40"/>
      <!-- cross-braces -->
      <path d="M55 104 L71.4 88 M73 104 L56.6 88"/>
      <path d="M56.6 88 L69.8 72 M71.4 88 L58.2 72"/>
      <path d="M58.2 72 L68.3 56 M69.8 72 L59.7 56"/>
      <path d="M59.7 56 L66.7 40 M68.3 56 L61.3 40"/>
      <!-- mast -->
      <path d="M62 33 L66 33"/>
      <path d="M64 33 L64 18"/>
    </g>
    <circle cx="64" cy="16.5" r="2.6" fill="#0b2330"/>

    <!-- 5G signal waves -->
    <g fill="none" stroke="#19c9e6" stroke-width="2.2" stroke-linecap="round">
      <path d="M57 25 q-6 -6 0 -13"/>
      <path d="M71 25 q6 -6 0 -13"/>
      <path d="M52 29 q-9 -10 0 -21" opacity="0.85"/>
      <path d="M76 29 q9 -10 0 -21" opacity="0.85"/>
    </g>
  </g>

  <!-- rim -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#0b2330" stroke-width="2.5"/>
  <circle cx="64" cy="64" r="61.4" fill="none" stroke="#19c9e6" stroke-width="1.4" opacity="0.55"/>
</svg>
